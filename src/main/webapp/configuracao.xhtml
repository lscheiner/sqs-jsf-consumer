<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions"
	template="template/template.xhtml">

<ui:define name="content">

		<div class="page-header">
		
		    <div class="page-title">
		        Configuração
		    </div>
		
		    <div class="page-subtitle">
		        Configuração de conexão e ambiente AWS
		    </div>
		
		</div>

	<h:form id="formAdminConfig">

								<p:panel header="Configuração do Client" style="max-width: 950px; margin:auto;">

									<div class="ui-fluid">

										<div style="margin-bottom: 1.5rem;">

											<p:outputLabel for="endpoint" value="Endpoint" style="font-weight:600;" />

											<p:inputText id="endpoint"
												value="#{configController.endpoint}"
												placeholder="http://localhost:4566"
												style="margin-top:.5rem; font-family:monospace;" />

										</div>

										<div style="margin-bottom: 1.5rem;">

											<p:outputLabel for="regiao" value="Região"	style="font-weight:600;" />

											<p:selectOneMenu id="regiao"
												value="#{configController.region}" filter="true"
												filterMatchMode="contains"
												style="margin-top:.5rem; width:100%;">

												<f:selectItems value="#{configController.regions}" />

											</p:selectOneMenu>

										</div>

										<div
											style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; padding: 1rem; border: 1px solid var(--surface-border); border-radius: 8px;">

											<div style="display: flex; align-items: center; gap: .75rem;">

												<p:tag
													value="#{configController.connected ? 'Conectado' : 'Desconectado'}"
													severity="#{configController.connected ? 'success' : 'danger'}" />
													
													<h:outputText value="#{configController.endpoint}" />
											</div>

											<div style="display: flex; align-items: center; gap: .5rem;">

												<span style="font-size: .9rem; color: var(--text-color-secondary);">

													Região: </span> <strong style="font-family: monospace;">

													<h:outputText value="#{configController.region}" /> </strong>

											</div>

										</div>

										<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; flex-wrap: wrap; gap: 1rem;">

											<div></div>

											<div style="display: flex; align-items: center; gap: .75rem;">

												<p:commandButton value="Testar conexão" icon="pi pi-link"
													process="@form" update=":growl"
													action="#{configController.testarConexao}"
													style="min-width:180px;  font-weight:600;" />

												<p:commandButton value="Aplicar" icon="pi pi-check"
													process="@form" update=":growl @form"
													action="#{configController.aplicarConfiguracao}"
													style="min-width:180px;  font-weight:600;" />

											</div>

										</div>

									</div>

								</p:panel>

							</h:form>
    

	</ui:define>


	<ui:define name="dialogs">

	</ui:define>
</ui:composition>
