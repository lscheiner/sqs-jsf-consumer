<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui" template="template/template.xhtml">

	<ui:define name="content">

		<div class="card">

			<p:growl id="growl" showDetail="true" life="4000" />

			<h:form>
				<p:contextMenu>
					<p:menuitem value="Atualizar filas" process="@this"
						update=":tabView" icon="pi pi-refresh" resetValues="true" />
				</p:contextMenu>
			</h:form>

			<p:tabView id="tabView" widgetVar="tabViewWidget">

				<p:tab title="Enviar Mensagem">

					<h:form id="formEnviar">

						<p:panel header="Enviar mensagem para fila SQS"
							style="max-width: 950px; margin:auto;">

							<div class="ui-fluid">

								<div style="margin-bottom: 1.5rem;">

									<p:outputLabel for="fila" value="Fila" style="font-weight:600;" />

									<p:selectOneMenu id="fila"
										value="#{sqsProducerController.filaSelecionada}"
										required="true" requiredMessage="Selecione uma fila."
										filter="true" filterMatchMode="contains"
										style="margin-top:.5rem; width:100%;">

										<f:selectItem itemLabel="Selecione uma fila"
											itemValue="#{null}" noSelectionOption="true" />

										<f:selectItems value="#{sqsProducerController.filas}" />

									</p:selectOneMenu>

								</div>

								<div style="margin-bottom: 1rem;">

									<p:outputLabel for="mensagem" value="Payload da mensagem"
										style="font-weight:600;" />

									<p:inputTextarea id="mensagem"
										value="#{sqsProducerController.payload}" rows="18"
										autoResize="false" maxlength="10000" counter="contador"
										counterTemplate="{0} caracteres restantes"
										placeholder="Digite o payload JSON da mensagem..."
										required="true"
										requiredMessage="Informe o payload da mensagem."
										style="margin-top:.5rem;
													 		font-family:monospace;
													 		font-size:.95rem;" />

								</div>

								<div
									style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; flex-wrap: wrap; gap: 1rem;">

									<h:outputText id="contador"
										style="color:var(--text-color-secondary);" />

									<div style="display: flex; align-items: center; gap: .75rem;">

										<p:commandButton value="Limpar" icon="pi pi-trash"
											outlined="true" process="@this" update="@form"
											action="#{sqsProducerController.limpar}"
											styleClass="ui-button-flat" />

										<p:commandButton id="btnEnviar" value="Enviar Mensagem"
											icon="pi pi-send"
											action="#{sqsProducerController.enviarMensagem}"
											update="@form growl" process="@form"
											style="min-width:220px;
														 		font-weight:600;" />

									</div>

								</div>

							</div>

						</p:panel>

					</h:form>

				</p:tab>

				<p:tab title="Consumir mensagens">

					<h:form id="formConsumir">

						<p:growl id="growl" showDetail="true" life="4000" />


						<p:panel header="Visualizar mensagens da fila"
							style="max-width: 950px; margin:auto;">

							<div class="ui-fluid">

								<div
									style="display: flex; gap: 1rem; align-items: end; margin-bottom: 1.5rem;">

									<div style="flex: 1;">

										<p:outputLabel for="filaConsumo" value="Fila"
											style="font-weight:600;" />

										<p:selectOneMenu id="filaConsumo"
											value="#{sqsConsumerController.filaSelecionada}"
											required="true" requiredMessage="Selecione uma fila."
											filter="true" filterMatchMode="contains"
											style="margin-top:.5rem; width:100%;">

											<f:selectItem itemLabel="Selecione uma fila"
												itemValue="#{null}" noSelectionOption="true" />

											<f:selectItems value="#{sqsConsumerController.filas}" />

										</p:selectOneMenu>

									</div>

									<div style="width: 140px;">

										<p:outputLabel for="quantidade" value="Quantidade"
											style="font-weight:600;" />

										<p:inputNumber id="quantidade"
											value="#{sqsConsumerController.quantidadeMensagens}"
											minValue="1" maxValue="10" decimalPlaces="0"
											style="margin-top:.5rem;" />

									</div>

									<div>
										<p:commandButton value="Buscar" icon="pi pi-search"
											action="#{sqsConsumerController.buscarMensagens}"
											update="@form growl" process="@form"
											style="height:42px;
                                                min-width:140px;
                                                font-weight:600;" />
									</div>

								</div>
								<p:dataTable id="tabelaMensagens"
									value="#{sqsConsumerController.mensagens}" var="mensagem"
									emptyMessage="Nenhuma mensagem encontrada" stripedRows="true"
									responsiveLayout="scroll">

									<p:column headerText="Message ID">
											<h:outputText value="#{mensagem.messageId()}" />
									</p:column>
									<p:column headerText="Recebida" style="width:80px; text-align:center;">
										<h:outputText value="#{sqsConsumerController.receiveCount(mensagem)}" />
									</p:column>

									<p:column headerText="Ações" style="width:110px; text-align:center;">

										<p:commandButton icon="pi pi-eye" title="Visualizar mensagem"
											rounded="true" process="@this" update=":dialogMensagemForm"
											oncomplete="PF('dialogMensagemWidget').show()"
											action="#{sqsConsumerController.visualizarMensagem(mensagem)}" />
											
									</p:column>
								</p:dataTable>
							</div>

						</p:panel>

					</h:form>

				</p:tab>

				<p:tab title="Administração">

					<p:tabView>

						<p:tab title="Configuração">

							<h:form id="formAdminConfig">

								<p:panel header="Configuração do SQS Client" style="max-width: 950px; margin:auto;">

									<div class="ui-fluid">

										<div style="margin-bottom: 1.5rem;">

											<p:outputLabel for="endpoint" value="Endpoint" style="font-weight:600;" />

											<p:inputText id="endpoint"
												value="#{sqsAdminController.endpoint}"
												placeholder="http://localhost:4566"
												style="margin-top:.5rem; font-family:monospace;" />

										</div>

										<div style="margin-bottom: 1.5rem;">

											<p:outputLabel for="regiao" value="Região"	style="font-weight:600;" />

											<p:selectOneMenu id="regiao"
												value="#{sqsAdminController.region}" filter="true"
												filterMatchMode="contains"
												style="margin-top:.5rem; width:100%;">

												<f:selectItems value="#{sqsAdminController.regions}" />

											</p:selectOneMenu>

										</div>

										<div
											style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; padding: 1rem; border: 1px solid var(--surface-border); border-radius: 8px;">

											<div style="display: flex; align-items: center; gap: .75rem;">

												<p:tag
													value="#{sqsAdminController.connected ? 'Conectado' : 'Desconectado'}"
													severity="#{sqsAdminController.connected ? 'success' : 'danger'}" />
													
													<h:outputText value="#{sqsAdminController.endpointAtual}" />
											</div>

											<div style="display: flex; align-items: center; gap: .5rem;">

												<span style="font-size: .9rem; color: var(--text-color-secondary);">

													Região: </span> <strong style="font-family: monospace;">

													<h:outputText value="#{sqsAdminController.region}" /> </strong>

											</div>

										</div>

										<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.2rem; flex-wrap: wrap; gap: 1rem;">

											<div></div>

											<div style="display: flex; align-items: center; gap: .75rem;">

												<p:commandButton value="Testar conexão" icon="pi pi-link"
													process="@form" update=":growl"
													action="#{sqsAdminController.testarConexao}"
													style="min-width:180px;  font-weight:600;" />

												<p:commandButton value="Aplicar" icon="pi pi-check"
													process="@form" update=":growl :tabView"
													action="#{sqsAdminController.aplicarConfiguracao}"
													oncomplete="PF('tabViewWidget').select(2)"
													style="min-width:180px;  font-weight:600;" />

											</div>

										</div>

									</div>

								</p:panel>

							</h:form>

						</p:tab>


						<p:tab title="Purge de filas">

							<h:form id="formAdminPurge">

								<p:panel header="Purge de filas"
									style="max-width: 950px; margin:auto;">

									<div class="ui-fluid">

										<div
											style="display: flex; gap: 1rem; align-items: end; margin-bottom: 1.5rem;">

											<div style="flex: 1;">

												<p:outputLabel for="filaPurge" value="Fila"
													style="font-weight:600;" />

												<p:selectOneMenu id="filaPurge"
													value="#{sqsAdminController.filaSelecionada}"
													required="true" requiredMessage="Selecione uma fila."
													filter="true" filterMatchMode="contains"
													style="margin-top:.5rem;  width:100%;">

													<f:selectItem itemLabel="Selecione uma fila"
														itemValue="#{null}" noSelectionOption="true" />

													<f:selectItems value="#{sqsAdminController.filas}" />

												</p:selectOneMenu>

											</div>

											<div>

												<p:commandButton value="Purge" icon="pi pi-trash"
													styleClass="ui-button-danger"
													action="#{sqsAdminController.purgeFila}" process="@form"
													update="@form :growl"
													style="height:42px; min-width:140px; font-weight:600;" />

											</div>
										</div>

										<p:staticMessage severity="warn" summary="Atenção"
											detail="O purge remove todas as mensagens da fila."
											style="width:100%;      margin-top:1rem;" />

									</div>

								</p:panel>

							</h:form>

						</p:tab>

					</p:tabView>

				</p:tab>


			</p:tabView>

		</div>

	</ui:define>


	<ui:define name="dialogs">

		<h:form id="dialogMensagemForm">

			<p:dialog id="dialogMensagem" widgetVar="dialogMensagemWidget"
				header="Conteúdo da mensagem" modal="true" width="900"
				resizable="false" responsive="true" fitViewport="true">

				<pre
					style="white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow: auto; background: #1e1e1e; color: #dcdcdc; padding: 1rem; border-radius: 8px; font-size: .9rem;">
					<h:outputText value="#{sqsConsumerController.conteudoMensagem}" />
            </pre>

			</p:dialog>

		</h:form>

	</ui:define>
</ui:composition>
