<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	template="template/template.xhtml">

	<ui:define name="content">

		<div class="card">

			<p:growl id="growl"
					  showDetail="true"
					  life="4000" />

			<p:tabView>

				<p:tab title="Enviar Mensagem">

					<h:form id="formEnviar">

						<p:panel header="Enviar mensagem para fila SQS"
								 style="max-width: 950px; margin:auto;">

							<div class="ui-fluid">

								<div style="margin-bottom:1.5rem;">

									<p:outputLabel for="fila"
												   value="Fila"
												   style="font-weight:600;" />

									<p:selectOneMenu id="fila"
													 value="#{sqsController.filaSelecionada}"
													 required="true"
													 requiredMessage="Selecione uma fila."
													 filter="true"
													 filterMatchMode="contains"
													 style="margin-top:.5rem; width:100%;">

										<f:selectItem itemLabel="Selecione uma fila"
													  itemValue="#{null}"
													  noSelectionOption="true" />

										<f:selectItems value="#{sqsController.filas}" />

									</p:selectOneMenu>

									<p:message for="fila"
											   display="text" />

								</div>

								<div style="margin-bottom:1rem;">

									<p:outputLabel for="mensagem"
												   value="Payload da mensagem"
												   style="font-weight:600;" />

									<p:inputTextarea id="mensagem"
													 value="#{sqsController.payload}"
													 rows="18"
													 autoResize="false"
													 maxlength="10000"
													 counter="contador"
													 counterTemplate="{0} caracteres restantes"
													 placeholder="Digite o payload JSON da mensagem..."
													 style="margin-top:.5rem;
													 		font-family:monospace;
													 		font-size:.95rem;" />

								</div>

								<div style="display:flex;
											justify-content:space-between;
											align-items:center;
											margin-top:1.2rem;
											flex-wrap:wrap;
											gap:1rem;">

									<h:outputText id="contador"
												  style="color:var(--text-color-secondary);" />

									<div style="display:flex;
												align-items:center;
												gap:.75rem;">

										<p:commandButton value="Limpar"
														 icon="pi pi-trash"
														 outlined="true"
														 process="@this"
														 update="@form"
														 action="#{sqsController.limpar}"
														 styleClass="ui-button-flat" />

										<p:commandButton id="btnEnviar"
														 value="Enviar Mensagem"
														 icon="pi pi-send"
														 action="#{sqsController.enviarMensagem}"
														 update="@form growl"
														 process="@form"
														 style="min-width:220px;
														 		font-weight:600;" />

									</div>

								</div>

							</div>

						</p:panel>

					</h:form>

				</p:tab>

				<p:tab title="Consumir mensagens">

					<p:panel header="Mensagens consumidas">

						<div style="text-align:center;
									padding:3rem 2rem;">

							<i class="pi pi-inbox"
							   style="font-size:3rem;
							   		  color:var(--text-color-secondary);" />

							<div style="margin-top:1rem;
										font-size:1.1rem;
										color:var(--text-color-secondary);">

								Nenhuma mensagem encontrada.

							</div>

						</div>

					</p:panel>

				</p:tab>

			</p:tabView>

		</div>

	</ui:define>
</ui:composition>
